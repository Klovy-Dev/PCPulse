name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      # tauri build signe automatiquement quand TAURI_SIGNING_PRIVATE_KEY est présent
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      # Si tauri build n'a pas signé (fallback) : créer le zip et signer manuellement
      - name: Sign NSIS bundle if not already signed
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $existing = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1
          if ($existing) {
            Write-Host "Deja signe par tauri build : $($existing.Name)"
            exit 0
          }

          Write-Host "Signature manuelle..."
          $exe = Get-ChildItem $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $exe) { throw "setup.exe introuvable" }

          $zipPath = Join-Path $nsisDir ($exe.BaseName + ".nsis.zip")
          Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -Force
          Write-Host "ZIP : $zipPath"

          # -k = clé en base64 (valeur directe du secret, sans passer par un fichier)
          npm run tauri -- signer sign -k $env:TAURI_SIGNING_PRIVATE_KEY $zipPath
          if ($LASTEXITCODE -ne 0) { throw "Signature echouee (exit $LASTEXITCODE)" }

          if (-not (Test-Path "$zipPath.sig")) { throw ".sig introuvable" }
          Write-Host "Signature OK"

      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $exe     = Get-ChildItem $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          $nsisZip = Get-ChildItem $nsisDir -Filter "*.nsis.zip" |
                       Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $sigFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          if (-not $exe)     { throw "setup.exe introuvable" }
          if (-not $nsisZip) { throw ".nsis.zip introuvable" }
          if (-not $sigFile) { throw ".nsis.zip.sig introuvable" }

          $signature   = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$($nsisZip.Name)"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM

          Write-Host "=== latest.json ===" ; Get-Content "latest.json"

          gh release create $tag `
            --title "NexBoost $tag" `
            --notes "NexBoost $tag" `
            $exe.FullName `
            $nsisZip.FullName `
            "latest.json"

          Write-Host "Release creee !"
