name: Release NexBoost

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      # Décoder le secret base64 → fichier .key sur disque
      - name: Decode signing key
        shell: pwsh
        env:
          KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $keyPath  = "$env:RUNNER_TEMP\nexboost.key"
          $keyBytes = [Convert]::FromBase64String($env:KEY_B64.Trim())
          [IO.File]::WriteAllBytes($keyPath, $keyBytes)
          "SIGNING_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Cle : $keyPath ($($keyBytes.Length) octets)"

      # Build normal — pas de signing pendant le build (c'est volontaire)
      - name: Build Tauri app
        run: npm run tauri build

      # On crée le .nsis.zip nous-mêmes puis on le signe
      - name: Package NSIS installer and sign
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $exe = Get-ChildItem $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $exe) { throw "setup.exe introuvable dans $nsisDir" }
          Write-Host "EXE : $($exe.FullName)"

          # Créer le zip (même nom que Tauri produirait)
          $zipName = $exe.BaseName + ".nsis.zip"
          $zipPath = Join-Path $nsisDir $zipName
          Compress-Archive -Path $exe.FullName -DestinationPath $zipPath -Force
          Write-Host "ZIP : $zipPath"

          # Signer le zip avec la clé
          # -f = chemin fichier clé, -W = pas de mot de passe
          npm run tauri -- signer sign -f $env:SIGNING_KEY_PATH -W $zipPath
          if ($LASTEXITCODE -ne 0) { throw "Signature echouee (exit $LASTEXITCODE)" }

          $sigPath = "$zipPath.sig"
          if (-not (Test-Path $sigPath)) { throw ".sig introuvable apres signature" }
          Write-Host "Signature OK : $sigPath"
          Write-Host "Contenu .sig :"
          Get-Content $sigPath

      # Créer la release GitHub et uploader les fichiers
      - name: Create GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $nsisDir = "src-tauri/target/release/bundle/nsis"

          $exe     = Get-ChildItem $nsisDir -Filter "*_x64-setup.exe" | Select-Object -First 1
          $nsisZip = Get-ChildItem $nsisDir -Filter "*.nsis.zip" |
                       Where-Object { $_.Name -notlike "*.sig" } | Select-Object -First 1
          $sigFile = Get-ChildItem $nsisDir -Filter "*.nsis.zip.sig" | Select-Object -First 1

          $signature   = (Get-Content $sigFile.FullName -Raw).Trim()
          $downloadUrl = "https://github.com/Klovy-Dev/nexboost/releases/download/$tag/$($nsisZip.Name)"
          $pubDate     = (Get-Date -AsUTC -Format "yyyy-MM-ddTHH:mm:ssZ")

          [ordered]@{
            version  = $version
            notes    = "NexBoost $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url       = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File "latest.json" -Encoding UTF8NoBOM

          Write-Host "=== latest.json ==="
          Get-Content "latest.json"

          gh release create $tag `
            --title "NexBoost $tag" `
            --notes "NexBoost $tag" `
            $exe.FullName `
            $nsisZip.FullName `
            "latest.json"

          Write-Host "Release creee !"
